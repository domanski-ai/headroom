name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - run: >-
          python -m pytest tests/test_tokens.py tests/test_history.py
          tests/test_headroom.py tests/test_widgets.py tests/test_supervisor.py
          tests/test_v2_supervision.py tests/test_handoff_codex.py -q
