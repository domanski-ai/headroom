<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>headroom</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="card" data-state="probing">
      <div class="mark" aria-hidden="true">
        <span class="battery"><span class="battery-fill"></span></span>
      </div>
      <h1>headroom</h1>

      <p class="status status-probing">connecting to the widget server&hellip;</p>

      <div class="status status-down">
        <p class="headline">server unreachable &mdash; is the tunnel up?</p>
        <p class="detail">
          couldn&rsquo;t reach <code id="widget-url">http://127.0.0.1:8377/widget</code>
        </p>
        <pre class="hint">ssh -N -L 8377:127.0.0.1:8377 &lt;headroom-host&gt;</pre>
        <button id="retry" type="button">Retry</button>
        <p class="auto">retrying automatically&hellip;</p>
      </div>
    </main>
    <script src="main.js"></script>
  </body>
</html>
